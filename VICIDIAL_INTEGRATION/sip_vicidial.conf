; =============================================================================
; SIP Configuration for Exodus Dialer - ViciDial Integration
; =============================================================================
; This connects Exodus to use ViciDial's VoIP trunk for outbound calls
; Server: 46.62.216.79 (merchantfundexp.cloudautodialer.in)
; =============================================================================

[general]
nat=force_rport,comedia
directmedia=no
context=from-vicidial
allowoverlap=no
udpbindaddr=0.0.0.0
tcpenable=yes
tcpbindaddr=0.0.0.0
transport=udp
srvlookup=yes
disallow=all
allow=ulaw
allow=alaw

; =============================================================================
; ViciDial Server Trunk (Register as SIP extension on ViciDial)
; =============================================================================
; This registers Exodus as an agent extension on ViciDial server
; Using one of the agent credentials (7531-7536)

[vicidial-trunk]
type=peer
host=46.62.216.79
username=7536
secret=7536
fromuser=7536
fromdomain=46.62.216.79
context=from-vicidial
insecure=port,invite
qualify=yes
disallow=all
allow=ulaw
allow=alaw
dtmfmode=rfc2833
canreinvite=no
nat=force_rport,comedia

; Alternative: Register as a trunk extension
register => 7536:7536@46.62.216.79/7536

; =============================================================================
; VoIP Provider Trunk (For direct outbound - if needed)
; =============================================================================
; VoIP Portal: http://88.99.144.14:7153/eng/
; This is the outbound VoIP gateway mapping

[voip-provider]
type=peer
host=88.99.144.14
port=5060
username=Javier-Gonzalez
secret=xhHQNxvh
fromuser=Javier-Gonzalez
context=from-provider
insecure=port,invite
qualify=yes
disallow=all
allow=ulaw
allow=alaw
dtmfmode=rfc2833
canreinvite=no
nat=force_rport,comedia

; =============================================================================
; Local Extensions for AI Bots (Exodus connects calls to these)
; =============================================================================

; Supervisor WebPhone for Call Monitoring  
[supervisor]
type=friend
secret=monitor123
host=dynamic
context=exodus-ai-context
disallow=all
allow=ulaw
allow=alaw
nat=force_rport,comedia
directmedia=no
qualify=yes
transport=udp,ws,wss
encryption=no
avpf=yes
force_avp=yes
icesupport=yes
dtmfmode=rfc2833
