; =============================================================================
; Extensions Configuration for Exodus Dialer - ViciDial Integration
; =============================================================================
; Routes outbound calls through ViciDial's VoIP trunk
; =============================================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
; ViciDial Server IP
VICIDIAL_SERVER=46.62.216.79
; VoIP Provider for outbound
VOIP_PROVIDER=88.99.144.14
; Default Caller ID (change regularly per provider instructions)
DEFAULT_CID=3053848391

; =============================================================================
; Inbound from ViciDial Server
; =============================================================================
[from-vicidial]
exten => _X.,1,NoOp(Incoming from ViciDial: ${EXTEN})
 same => n,Goto(exodus-ai-context,${EXTEN},1)

; =============================================================================
; Inbound from VoIP Provider
; =============================================================================
[from-provider]
exten => _X.,1,NoOp(Incoming from VoIP Provider: ${EXTEN})
 same => n,Goto(exodus-ai-context,${EXTEN},1)

; =============================================================================
; Main Outbound Context - Routes through ViciDial's VoIP
; =============================================================================
[exodus-outbound]
; US Numbers (10 or 11 digit)
exten => _1NXXNXXXXXX,1,NoOp(Outbound call to ${EXTEN} via ViciDial trunk)
 same => n,Set(CALLERID(num)=${DEFAULT_CID})
 same => n,Set(CALLERID(name)=Fund Express)
 same => n,Dial(SIP/${EXTEN}@vicidial-trunk,60,tT)
 same => n,Hangup()

exten => _NXXNXXXXXX,1,NoOp(Outbound call to 1${EXTEN} via ViciDial trunk)
 same => n,Set(CALLERID(num)=${DEFAULT_CID})
 same => n,Set(CALLERID(name)=Fund Express)
 same => n,Dial(SIP/1${EXTEN}@vicidial-trunk,60,tT)
 same => n,Hangup()

; Direct VoIP Provider routing (alternative)
exten => _91NXXNXXXXXX,1,NoOp(Outbound via VoIP Provider: ${EXTEN:1})
 same => n,Set(CALLERID(num)=${DEFAULT_CID})
 same => n,Dial(SIP/${EXTEN:1}@voip-provider,60,tT)
 same => n,Hangup()

; =============================================================================
; AudioSocket Dial Context - For AI Bot Integration
; =============================================================================
[audiosocket-dial]
; Wait Extension - Used while call is ringing/dialing
exten => wait,1,NoOp(Call dialing, waiting for answer)
 same => n,Wait(30)
 same => n,Hangup()

; Bot Extensions (9092-9111) - Bridge to AI bots
exten => _909[2-9],1,NoOp(Bridging to bot on port ${EXTEN})
 same => n,Answer()
 same => n,Set(AUDIOSOCKET_UUID=${SHELL(cat /proc/sys/kernel/random/uuid | tr -d '\n')})
 same => n,Set(CALL_ID=${UNIQUEID}_bot${EXTEN})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${STRFTIME(,,%Y-%m-%d)}/${STRFTIME(,,%H-%M-%S)}_${CALLERID(num)}_bot${EXTEN}_${UNIQUEID}.wav)
 same => n,Set(AUDIOHOOK_INHERIT(MixMonitor)=yes)
 same => n,MixMonitor(${RECORDING_FILE})
 same => n,AudioSocket(${AUDIOSOCKET_UUID},127.0.0.1:${EXTEN})
 same => n,StopMixMonitor()
 same => n,Hangup()

exten => _910[0-9],1,NoOp(Bridging to bot on port ${EXTEN})
 same => n,Answer()
 same => n,Set(AUDIOSOCKET_UUID=${SHELL(cat /proc/sys/kernel/random/uuid | tr -d '\n')})
 same => n,Set(CALL_ID=${UNIQUEID}_bot${EXTEN})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${STRFTIME(,,%Y-%m-%d)}/${STRFTIME(,,%H-%M-%S)}_${CALLERID(num)}_bot${EXTEN}_${UNIQUEID}.wav)
 same => n,Set(AUDIOHOOK_INHERIT(MixMonitor)=yes)
 same => n,MixMonitor(${RECORDING_FILE})
 same => n,AudioSocket(${AUDIOSOCKET_UUID},127.0.0.1:${EXTEN})
 same => n,StopMixMonitor()
 same => n,Hangup()

exten => 9111,1,NoOp(Bridging to bot on port 9111)
 same => n,Answer()
 same => n,Set(AUDIOSOCKET_UUID=${SHELL(cat /proc/sys/kernel/random/uuid | tr -d '\n')})
 same => n,Set(CALL_ID=${UNIQUEID}_bot9111)
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${STRFTIME(,,%Y-%m-%d)}/${STRFTIME(,,%H-%M-%S)}_${CALLERID(num)}_bot9111_${UNIQUEID}.wav)
 same => n,Set(AUDIOHOOK_INHERIT(MixMonitor)=yes)
 same => n,MixMonitor(${RECORDING_FILE})
 same => n,AudioSocket(${AUDIOSOCKET_UUID},127.0.0.1:9111)
 same => n,StopMixMonitor()
 same => n,Hangup()

; =============================================================================
; AI Bot Context - For monitoring and direct dialing
; =============================================================================
[exodus-ai-context]
; Extension 700 - Listen to all active calls
exten => 700,1,NoOp(Monitor Mode: Listen to all channels)
 same => n,Answer()
 same => n,Wait(1)
 same => n,ChanSpy(SIP,q)
 same => n,Hangup()

; Extension 710 - Whisper mode
exten => 710,1,NoOp(Whisper Mode: Talk to agent only)
 same => n,Answer()
 same => n,Wait(1)
 same => n,ChanSpy(SIP,w)
 same => n,Hangup()

; Extension 711 - Barge mode
exten => 711,1,NoOp(Barge Mode: Join the call)
 same => n,Answer()
 same => n,Wait(1)
 same => n,ChanSpy(SIP,B)
 same => n,Hangup()

; Direct dial to bot extensions
exten => _909[2-9],1,NoOp(Direct dial to bot ${EXTEN})
 same => n,Goto(audiosocket-dial,${EXTEN},1)

exten => _91[0-1][0-1],1,NoOp(Direct dial to bot ${EXTEN})
 same => n,Goto(audiosocket-dial,${EXTEN},1)

; Outbound calls route through ViciDial trunk
exten => _1NXXNXXXXXX,1,Goto(exodus-outbound,${EXTEN},1)
exten => _NXXNXXXXXX,1,Goto(exodus-outbound,${EXTEN},1)
