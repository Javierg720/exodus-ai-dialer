<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="blueGrad">
      <stop offset="0%" stop-color="#6FAADB"/>
      <stop offset="100%" stop-color="#2E5C8A"/>
    </radialGradient>
    <radialGradient id="grayGrad">
      <stop offset="0%" stop-color="#CFD8DC"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </radialGradient>
    <radialGradient id="coreGrad">
      <stop offset="0%" stop-color="#4A90E2"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </radialGradient>
  </defs>
  
  <!-- Central AI Core -->
  <g stroke="#4A90E2" stroke-width="2" fill="none" opacity="0.8">
    <polygon points="150,100 180,120 180,160 150,180 120,160 120,120"/>
  </g>
  
  <!-- Customer Interaction Layer -->
  <g stroke="#78909C" stroke-width="1.5" fill="none" opacity="0.6">
    <polygon points="150,50 190,70 200,110 180,140 150,150 120,140 100,110 110,70"/>
    <polygon points="150,150 190,170 200,210 180,240 150,250 120,240 100,210 110,170"/>
  </g>
  
  <!-- Data Processing Nodes -->
  <g stroke="#4A90E2" stroke-width="1.2" fill="none" opacity="0.5">
    <polygon points="80,80 100,90 100,110 80,120 60,110 60,90"/>
    <polygon points="220,80 240,90 240,110 220,120 200,110 200,90"/>
    <polygon points="80,180 100,190 100,210 80,220 60,210 60,190"/>
    <polygon points="220,180 240,190 240,210 220,220 200,210 200,190"/>
  </g>
  
  <!-- Analytics & Learning Nodes -->
  <g stroke="#546E7A" stroke-width="1" fill="none" opacity="0.4">
    <polygon points="50,150 70,160 70,180 50,190 30,180 30,160"/>
    <polygon points="250,150 270,160 270,180 250,190 230,180 230,160"/>
    <polygon points="150,30 170,40 170,60 150,70 130,60 130,40"/>
    <polygon points="150,230 170,240 170,260 150,270 130,260 130,240"/>
  </g>
  
  <!-- Communication Channels -->
  <g stroke="#78909C" stroke-width="0.8" fill="none" opacity="0.3">
    <polygon points="100,50 120,60 120,80 100,90 80,80 80,60"/>
    <polygon points="200,50 220,60 220,80 200,90 180,80 180,60"/>
    <polygon points="100,210 120,220 120,240 100,250 80,240 80,220"/>
    <polygon points="200,210 220,220 220,240 200,250 180,240 180,220"/>
  </g>
  
  <!-- Sales Funnel Stages -->
  <g stroke="#4A90E2" stroke-width="1" fill="none" opacity="0.6">
    <polygon points="150,100 170,110 170,130 150,140 130,130 130,110"/>
    <polygon points="150,140 170,150 170,170 150,180 130,170 130,150"/>
  </g>
  
  <!-- Connection Paths -->
  <g stroke="#4A90E2" stroke-width="0.6" fill="none" opacity="0.4">
    <polygon points="150,100 180,120 170,140 150,150 130,140 120,120"/>
    <polygon points="150,150 180,170 170,190 150,200 130,190 120,170"/>
    <polygon points="80,80 100,90 90,110 80,120 70,110 60,90"/>
    <polygon points="220,80 240,90 230,110 220,120 210,110 200,90"/>
  </g>
  
  <!-- Core Processing Nodes -->
  <g stroke="#2E5C8A" stroke-width="0.8" fill="none" opacity="0.5">
    <polygon points="150,120 165,130 165,150 150,160 135,150 135,130"/>
    <polygon points="150,130 160,140 160,150 150,160 140,150 140,140"/>
  </g>
  
  <!-- Main Nodes - AI Core -->
  <circle cx="150" cy="140" r="8" fill="url(#coreGrad)"/>
  <circle cx="150" cy="120" r="6" fill="url(#blueGrad)"/>
  <circle cx="150" cy="160" r="6" fill="url(#blueGrad)"/>
  
  <!-- Customer Interface Nodes -->
  <circle cx="150" cy="70" r="5" fill="url(#grayGrad)"/>
  <circle cx="190" cy="90" r="4" fill="#78909C"/>
  <circle cx="200" cy="130" r="4" fill="#78909C"/>
  <circle cx="190" cy="170" r="4" fill="#78909C"/>
  <circle cx="150" cy="190" r="5" fill="url(#grayGrad)"/>
  <circle cx="110" cy="170" r="4" fill="#78909C"/>
  <circle cx="100" cy="130" r="4" fill="#78909C"/>
  <circle cx="110" cy="90" r="4" fill="#78909C"/>
  
  <!-- Data Processing Nodes -->
  <circle cx="80" cy="100" r="4" fill="url(#blueGrad)"/>
  <circle cx="220" cy="100" r="4" fill="url(#blueGrad)"/>
  <circle cx="80" cy="200" r="4" fill="url(#blueGrad)"/>
  <circle cx="220" cy="200" r="4" fill="url(#blueGrad)"/>
  
  <!-- Analytics Nodes -->
  <circle cx="50" cy="170" r="3" fill="#546E7A"/>
  <circle cx="250" cy="170" r="3" fill="#546E7A"/>
  <circle cx="150" cy="50" r="3" fill="#546E7A"/>
  <circle cx="150" cy="250" r="3" fill="#546E7A"/>
  
  <!-- Communication Nodes -->
  <circle cx="90" cy="70" r="3" fill="#78909C"/>
  <circle cx="210" cy="70" r="3" fill="#78909C"/>
  <circle cx="90" cy="230" r="3" fill="#78909C"/>
  <circle cx="210" cy="230" r="3" fill="#78909C"/>
  
  <!-- Decision Points -->
  <circle cx="130" cy="120" r="3" fill="#4A90E2"/>
  <circle cx="170" cy="120" r="3" fill="#4A90E2"/>
  <circle cx="130" cy="160" r="3" fill="#4A90E2"/>
  <circle cx="170" cy="160" r="3" fill="#4A90E2"/>
  
  <!-- Learning Nodes -->
  <circle cx="150" cy="100" r="2.5" fill="#2E5C8A"/>
  <circle cx="150" cy="180" r="2.5" fill="#2E5C8A"/>
  <circle cx="120" cy="140" r="2.5" fill="#2E5C8A"/>
  <circle cx="180" cy="140" r="2.5" fill="#2E5C8A"/>
  
  <!-- Peripheral Nodes -->
  <circle cx="60" cy="60" r="2" fill="#78909C"/>
  <circle cx="240" cy="60" r="2" fill="#78909C"/>
  <circle cx="60" cy="240" r="2" fill="#78909C"/>
  <circle cx="240" cy="240" r="2" fill="#78909C"/>
  
  <!-- Total: 37 nodes representing AI Sales Agent components -->
</svg>
