; ============================================================================
; Call Monitoring Context (Whisper/Barge Feature)
; ============================================================================
[ava-context]
; Extension 700 - Listen to all active calls (cycle through)
exten => 700,1,NoOp(Monitor Mode: Listen to all channels)
 same => n,Answer()
 same => n,Wait(1)
 same => n,ChanSpy(PJSIP,q)  ; q = quiet mode (listen only)
 same => n,Hangup()

; Extension 701 - Listen to specific bot (Bot 1 - port 9092)
exten => 701,1,NoOp(Monitor Mode: Listen to Bot 1)
 same => n,Answer()
 same => n,Wait(1)
 same => n,ChanSpy(PJSIP,qB)  ; Monitor specific channel
 same => n,Hangup()

; Extension 702 - Listen to specific bot (Bot 2 - port 9093)
exten => 702,1,NoOp(Monitor Mode: Listen to Bot 2)
 same => n,Answer()
 same => n,Wait(1)
 same => n,ChanSpy(PJSIP,qB)
 same => n,Hangup()

; Extension 703 - Listen to specific bot (Bot 3 - port 9094)
exten => 703,1,NoOp(Monitor Mode: Listen to Bot 3)
 same => n,Answer()
 same => n,Wait(1)
 same => n,ChanSpy(PJSIP,qB)
 same => n,Hangup()

; Extension 710 - Whisper mode (talk to agent/bot, customer can't hear)
exten => 710,1,NoOp(Whisper Mode: Talk to agent only)
 same => n,Answer()
 same => n,Wait(1)
 same => n,ChanSpy(PJSIP,w)  ; w = whisper mode
 same => n,Hangup()

; Extension 711 - Barge mode (join call, everyone can hear)
exten => 711,1,NoOp(Barge Mode: Join the call)
 same => n,Answer()
 same => n,Wait(1)
 same => n,ChanSpy(PJSIP,B)  ; B = barge mode (talk to both)
 same => n,Hangup()

; Direct dial to bot extensions (for testing/manual calls)
exten => _909[2-9],1,NoOp(Direct dial to bot ${EXTEN})
 same => n,Goto(audiosocket-dial,${EXTEN},1)

exten => _91[0-1][0-1],1,NoOp(Direct dial to bot ${EXTEN})
 same => n,Goto(audiosocket-dial,${EXTEN},1)

; ============================================================================
; Installation Instructions:
; ============================================================================
; 1. Copy this configuration to /etc/asterisk/extensions.conf
;    (or include it: #include "asterisk-dialer-config.conf")
;
; 2. Reload Asterisk dialplan:
;    asterisk -rx "dialplan reload"
;
; 3. Verify configuration:
;    asterisk -rx "dialplan show audiosocket-dial"
;    asterisk -rx "dialplan show ava-context"
; ============================================================================
